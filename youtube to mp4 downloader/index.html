<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate 4K Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding-bottom: 50px; }
        
        .donate-btn { position: fixed; top: 20px; right: 20px; background: #FFD700; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(255,215,0,0.3); z-index: 10; }
        
        .container { background: #1a1a1a; padding: 40px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; margin-top: 80px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); border: 1px solid #333; }
        
        /* Logo and Title Styles */
        .main-title { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .main-title i { color: #ff0000; font-size: 35px; }
        h1 { color: white; margin: 0; font-size: 26px; }
        
        .insta-credit { display: flex; align-items: center; justify-content: center; gap: 6px; color: #E1306C; font-weight: bold; margin-bottom: 25px; font-size: 14px; text-decoration: none; }
        
        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #222; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        input[type="text"]:focus { border-color: #ff0000; }
        
        #preview-box { display: none; margin-bottom: 20px; text-align: left; }
        #preview-box img { width: 100%; border-radius: 12px; border: 2px solid #ff0000; }
        #v-title { font-size: 14px; margin-top: 10px; color: #ccc; }

        select { width: 100%; padding: 12px; border-radius: 10px; background: #333; color: white; border: none; margin-bottom: 25px; cursor: pointer; }
        
        .dl-button { background: #ff0000; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .dl-button:hover { background: #cc0000; transform: scale(1.02); }

        /* Progress & Success */
        #loading-area { display: none; margin-top: 25px; }
        .progress-bar { width: 100%; height: 10px; background: #333; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { width: 0%; height: 100%; background: #ff0000; transition: width 0.4s; }
        #success-msg { display: none; color: #2ecc71; margin-top: 20px; font-weight: bold; font-size: 18px; animation: popIn 0.5s ease; }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* QR Modal */
        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
        .qr-card { background: white; padding: 25px; border-radius: 20px; text-align: center; color: black; }
    </style>
</head>
<body>

    <button class="donate-btn" onclick="document.getElementById('qr-modal').style.display='flex'">Donate ☕</button>

    <div class="container">
        <div class="main-title">
            <i class="fab fa-youtube"></i>
            <h1>YT Downloader Pro</h1>
        </div>
        
        <a href="https://instagram.com/V1KR4M_4U" target="_blank" class="insta-credit">
            <i class="fab fa-instagram"></i> @V1KR4M_4U
        </a>

        <div id="preview-box">
            <img id="thumb" src="" alt="Thumbnail">
            <div id="v-title"></div>
        </div>

        <form id="dlForm" action="/download" method="POST">
            <input type="text" id="urlInput" name="url" placeholder="Paste YouTube Link..." required>
            <select name="format">
                <option value="mp4">Video (4K/Best Quality)</option>
                <option value="mp3">Audio (320kbps MP3)</option>
            </select>
            <button type="submit" class="dl-button" id="dlBtn">Start Download</button>
        </form>

        <div id="loading-area">
            <p style="font-size:13px; color:#aaa; margin:0;">Processing & Merging... Please wait.</p>
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        </div>

        <div id="success-msg">
            <i class="fas fa-check-circle" style="font-size: 30px; display: block; margin-bottom: 5px;"></i>
            Download Successful!
        </div>
    </div>

    <div id="qr-modal" onclick="this.style.display='none'">
        <div class="qr-card">
            <h3>Support My Work</h3>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=9823714470@nyes&pn=Developer" alt="QR">
            <p style="font-weight:bold; margin-top:10px;">9823714470@nyes</p>
        </div>
    </div>

    <audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const urlInput = document.getElementById('urlInput');
        const loadingArea = document.getElementById('loading-area');
        const successMsg = document.getElementById('success-msg');
        const fill = document.getElementById('fill');
        const successSound = document.getElementById('successSound');

        urlInput.addEventListener('input', async (e) => {
            const val = e.target.value;
            if(val.includes('youtube.com') || val.includes('youtu.be')) {
                const res = await fetch('/get_info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: val})
                });
                const data = await res.json();
                if(data.thumbnail) {
                    document.getElementById('thumb').src = data.thumbnail;
                    document.getElementById('v-title').innerText = data.title;
                    document.getElementById('preview-box').style.display = 'block';
                }
            }
        });

        document.getElementById('dlForm').onsubmit = function() {
            loadingArea.style.display = 'block';
            successMsg.style.display = 'none';
            fill.style.background = '#ff0000';
            let width = 0;
            const interval = setInterval(() => {
                if(width < 92) { width += 0.4; fill.style.width = width + '%'; }
            }, 400);

            setTimeout(() => {
                clearInterval(interval);
                fill.style.width = '100%';
                fill.style.background = '#2ecc71';
                setTimeout(() => {
                    loadingArea.style.display = 'none';
                    successMsg.style.display = 'block';
                    successSound.play();
                    setTimeout(() => { successMsg.style.display = 'none'; fill.style.width = '0%'; }, 5000);
                }, 1000);
            }, 15000); 
        };
    </script>
</body>
</html>
